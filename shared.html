<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introductions · Warmbit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --accent: #c8f25a;
    --text: #e8e8e8;
    --muted: #555;
    --tag-linkedin: #1a3a5c;
    --tag-newsletter: #3a1a5c;
    --tag-email: #3a2a1a;
    --tag-notes: #1a3a2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--accent);
  }

  .powered {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Main content */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  /* Query banner */
  .query-banner {
    margin-bottom: 40px;
  }

  .query-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .query-text {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.4;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
  }

  .meta-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  /* Results count */
  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 640px) {
    .results-grid { grid-template-columns: 1fr; }
    .container { padding: 32px 20px; }
    .header { padding: 16px 20px; }
  }
  .intro-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .intro-btn:hover { border-color: #c8f25a; color: #c8f25a; background: rgba(200,242,90,0.08); }
  .intro-btn.selected { background: #c8f25a; color: #0a0a0a; border-color: #c8f25a; }
  .card.selected { border-color: #c8f25a; box-shadow: 0 0 0 1px #c8f25a; }
  .request-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0f0f0f; border-top: 1px solid #c8f25a; padding: 16px 40px; z-index: 50; align-items: center; justify-content: space-between; }
  .request-bar.active { display: flex; }
  .request-bar-label { font-family: 'DM Mono', monospace; font-size: 11px; color: #c8f25a; letter-spacing: 0.08em; }
  .request-bar-btn { background: #c8f25a; color: #0a0a0a; border: none; padding: 10px 24px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .show-more-wrap { text-align: center; margin-top: 24px; }
  .show-more-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 28px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .show-more-btn:hover { border-color: #c8f25a; color: #c8f25a; }
  .email-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 40px; }
  .email-modal-overlay.active { display: flex; }
  .email-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 440px; padding: 32px; display: flex; flex-direction: column; gap: 16px; }
  .email-modal-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .email-modal-desc { font-size: 13px; color: #888; line-height: 1.6; }
  .email-modal-input { background: #0a0a0a; border: 1px solid var(--border); border-radius: 2px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; width: 100%; }
  .email-modal-input:focus { border-color: #c8f25a; }
  .email-modal-error { font-family: 'DM Mono', monospace; font-size: 10px; color: #ff6b6b; }
  .email-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .email-modal-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
  .email-modal-confirm { background: #c8f25a; color: #0a0a0a; border: none; padding: 8px 18px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    transition: border-color 0.2s;
  }

  .card:hover {
    border-color: #333;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
  }

  .card-title {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  .source-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .source-badge.linkedin { background: var(--tag-linkedin); color: #6ba3d6; }
  .source-badge.newsletter { background: var(--tag-newsletter); color: #a87dd4; }
  .source-badge.email { background: var(--tag-email); color: #d4a574; }
  .source-badge.notes { background: var(--tag-notes); color: #74d4a5; }

  /* Score bar */
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .score-bar-track {
    flex: 1;
    height: 2px;
    background: #1e1e1e;
    border-radius: 1px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .score-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 12px;
    text-align: right;
  }

  /* Reason */
  .card-reason {
    font-size: 13px;
    color: #999;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  /* Email */
  .card-email {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-email::before {
    content: '≈';
    font-size: 13px;
  }

  /* Empty / error state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 48px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  /* Fade in animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: fadeUp 0.4s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.40s; }
  .card:nth-child(9) { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">WARM<span>BIT</span></div>
  <div class="powered">NETWORK INTELLIGENCE</div>
</div>

<div class="container">
  <div id="content">
    <div class="empty-state">LOADING...</div>
  </div>
</div>

<div class="footer">
  POWERED BY <a href="#">WARMBIT</a> · NETWORK INTELLIGENCE
</div>

<script>
function decodeResults(encoded) {
  try {
    return JSON.parse(decodeURIComponent(atob(encoded)));
  } catch {
    return null;
  }
}

function getSourceClass(source) {
  if (!source) return 'linkedin';
  const s = source.toLowerCase();
  if (s.includes('newsletter')) return 'newsletter';
  if (s.includes('email')) return 'email';
  if (s.includes('note')) return 'notes';
  return 'linkedin';
}

const _selectedIntros = new Map();
let _sharedQuery = '';

function updateRequestBar() {
  const bar = document.getElementById('requestBar');
  const label = document.getElementById('requestBarLabel');
  const count = _selectedIntros.size;
  label.textContent = `${count} SELECTED`;
  bar.classList.toggle('active', count > 0);
}

function toggleIntro(btn, r) {
  const card = btn.closest('.card');
  const key = r.email || r.name;
  if (_selectedIntros.has(key)) {
    _selectedIntros.delete(key);
    btn.textContent = 'Request Intro';
    btn.classList.remove('selected');
    card.classList.remove('selected');
  } else {
    _selectedIntros.set(key, r);
    btn.textContent = 'Selected ✓';
    btn.classList.add('selected');
    card.classList.add('selected');
  }
  updateRequestBar();
}

function openIntrosPage() {
  document.getElementById('emailModal').classList.add('active');
  document.getElementById('requesterEmail').focus();
}

async function confirmIntros() {
  const email = document.getElementById('requesterEmail').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Please enter a valid email.';
    return;
  }
  document.getElementById('emailError').textContent = '';
  const confirmBtn = document.getElementById('confirmIntrosBtn');
  confirmBtn.textContent = 'SAVING...';
  confirmBtn.disabled = true;

  const people = Array.from(_selectedIntros.values());
  try {
    await fetch(`${API}/intro_request`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requester_email: email, query: _sharedQuery, requested_people: people })
    });
  } catch (e) {
    console.error('Failed to save intro request', e);
  }

  document.getElementById('emailModal').classList.remove('active');
  document.getElementById('thanksModal').style.display = 'flex';
}

function render(payload) {
  const content = document.getElementById('content');
  const { q, r: results, t } = payload;
  _sharedQuery = q || '';

  if (!results || results.length === 0) {
    content.innerHTML = '<div class="empty-state">NO RESULTS FOUND</div>';
    return;
  }

  const date = t ? new Date(t).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';

  const PAGE_SIZE = 15;
  let _shownCount = 0;
  let _allResults = results;

  function renderGrid() {
    const grid = document.getElementById('sharedGrid');
    const toShow = _allResults.slice(_shownCount, _shownCount + PAGE_SIZE);
    toShow.forEach(r => {
      const card = document.createElement('div');
      card.className = 'card';
      const score = r.relevance_score || 0;
      const pct = (score / 10) * 100;
      const subtitle = [r.position, r.company].filter(Boolean).join(' · ');
      const rJson = JSON.stringify(r).replace(/"/g, '&quot;');
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-name">${r.name || 'Unknown'}</div>
            ${subtitle ? `<div class="card-title">${subtitle}</div>` : ''}
          </div>
          <button class="intro-btn" onclick="toggleIntro(this, ${rJson})">Request Intro</button>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-track"><div class="score-bar-fill" style="width: ${pct}%"></div></div>
          <div class="score-num">${score}</div>
        </div>
        <div class="card-reason">${r.reason || ''}</div>
        <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          ${r.linkedin_url ? `<a href="${r.linkedin_url}" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:6px 14px;border-radius:2px;text-decoration:none;">LinkedIn →</a>` : ''}
        </div>`;
      grid.appendChild(card);
    });
    _shownCount += toShow.length;
    const wrap = document.getElementById('showMoreWrap');
    if (_shownCount >= _allResults.length) {
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'block';
      document.getElementById('showMoreBtn').textContent = `Show ${Math.min(PAGE_SIZE, _allResults.length - _shownCount)} More →`;
    }
  }

  window._renderGrid = renderGrid;

  let html = `
    <div class="query-banner">
      <div class="query-label">Search Query</div>
      <div class="query-text">${q || 'Network Search'}</div>
      <div class="meta-row">
        <div class="meta-pill">${results.length} RESULTS</div>
        ${date ? `<div class="meta-pill">${date}</div>` : ''}
      </div>
    </div>
    <div class="divider"></div>
    <div class="results-count">${results.length} INTRODUCTION${results.length !== 1 ? 'S' : ''}</div>
    <div class="results-grid" id="sharedGrid"></div>
    <div id="showMoreWrap" class="show-more-wrap" style="display:none">
      <button class="show-more-btn" id="showMoreBtn" onclick="window._renderGrid()">Show More →</button>
    </div>
  `;
  content.innerHTML = html;
  renderGrid();
  return;

  // legacy - not reached
  results.forEach(r => {
    const score = r.relevance_score || 0;
    const pct = (score / 10) * 100;
    const subtitle = [r.position, r.company].filter(Boolean).join(' · ');
    const rJson = JSON.stringify(r).replace(/"/g, '&quot;');

    html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-name">${r.name || 'Unknown'}</div>
            ${subtitle ? `<div class="card-title">${subtitle}</div>` : ''}
          </div>
          <button class="intro-btn" onclick="toggleIntro(this, ${rJson})">Request Intro</button>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width: ${pct}%"></div>
          </div>
          <div class="score-num">${score}</div>
        </div>
        <div class="card-reason">${r.reason || ''}</div>
        <div style="display:flex;align-items:center;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          ${r.linkedin_url ? `<a href="${r.linkedin_url}" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:6px 14px;border-radius:2px;text-decoration:none;">LinkedIn →</a>` : ''}
        </div>
      </div>
    `;
  });

  html += `</div>`;
  content.innerHTML = html;
}

// Load from short ID in path e.g. warmbit.co/s/abc123
const API = 'https://email-intelligence-production-3b44.up.railway.app';
const pathParts = window.location.pathname.split('/');
const shareId = pathParts[pathParts.length - 1];

// Also support legacy ?share= param
const params = new URLSearchParams(window.location.search);
const legacyShare = params.get('share');

if (legacyShare) {
  // Legacy long URL support
  try {
    const payload = JSON.parse(decodeURIComponent(atob(legacyShare)));
    render(payload);
  } catch {
    document.getElementById('content').innerHTML = '<div class="empty-state">INVALID LINK</div>';
  }
} else if (shareId && shareId !== 'shared.html') {
  // New short URL — fetch from API
  fetch(`${API}/s/${shareId}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('content').innerHTML = '<div class="empty-state">RESULTS NOT FOUND</div>';
      } else {
        render({ q: data.query, r: data.results, t: new Date(data.created_at).getTime() });
      }
    })
    .catch(() => {
      document.getElementById('content').innerHTML = '<div class="empty-state">ERROR LOADING RESULTS</div>';
    });
} else {
  document.getElementById('content').innerHTML = '<div class="empty-state">NO RESULTS TO DISPLAY · THIS IS A SHARED RESULTS PAGE</div>';
}
</script>
<div class="request-bar" id="requestBar">
  <span class="request-bar-label" id="requestBarLabel">0 SELECTED</span>
  <button class="request-bar-btn" onclick="openIntrosPage()">Request Intros →</button>
</div>

<div class="email-modal-overlay" id="emailModal">
  <div class="email-modal">
    <div class="email-modal-title">Almost there</div>
    <div class="email-modal-desc">Enter your email so we can track this intro request.</div>
    <input type="email" class="email-modal-input" id="requesterEmail" placeholder="you@example.com" onkeydown="if(event.key==='Enter') confirmIntros()" />
    <div class="email-modal-error" id="emailError"></div>
    <div class="email-modal-actions">
      <button class="email-modal-cancel" onclick="document.getElementById('emailModal').classList.remove('active')">Cancel</button>
      <button class="email-modal-confirm" id="confirmIntrosBtn" onclick="confirmIntros()">Continue →</button>
    </div>
  </div>
</div>
<div id="thanksModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:40px;">
  <div style="background:#111;border:1px solid #c8f25a;border-radius:4px;width:100%;max-width:440px;padding:40px;display:flex;flex-direction:column;gap:16px;text-align:center;">
    <div style="font-size:32px;">✓</div>
    <div style="font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#c8f25a;">Request Received</div>
    <div style="font-size:14px;color:#888;line-height:1.65;">We'll reach out to those folks and make the intro when we hear back. Keep an eye on your inbox!</div>
    <button onclick="document.getElementById('thanksModal').style.display='none'; document.getElementById('requestBar').classList.remove('active');"
      style="background:transparent;border:1px solid #1e1e1e;color:#555;padding:8px 18px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-top:8px;">Done</button>
  </div>
</div>
</body>
</html>
