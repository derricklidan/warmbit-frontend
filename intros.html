<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Requests · Warmbit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --border-hover: #2a2a2a;
    --text: #e8e8e8; --muted: #555; --accent: #c8f25a; --accent-dim: rgba(200,242,90,0.08);
    --linkedin: #4a9eff; --email: #ff8c4a; --newsletter: #b06af5; --notes: #4aff9e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); }
  .header-inner { max-width: 960px; margin: 0 auto; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
  .logo strong { color: var(--accent); font-weight: 400; }
  .nav-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
  main { max-width: 960px; margin: 0 auto; padding: 48px 40px 80px; }
  .page-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .page-title { font-size: 24px; font-weight: 400; margin-bottom: 32px; }
  .filters { display: flex; gap: 8px; margin-bottom: 28px; }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .request-block { border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 16px; transition: border-color 0.2s; }
  .request-block.done { opacity: 0.45; }
  .request-block:hover { border-color: var(--border-hover); }
  .request-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
  .requester { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.05em; }
  .request-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .request-query { font-size: 13px; color: #888; margin-bottom: 16px; font-style: italic; }
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .person-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 12px 14px; }
  .person-chip-name { font-size: 13px; font-weight: 400; margin-bottom: 3px; }
  .person-chip-title { font-size: 11px; color: var(--muted); }
  .person-chip-linkedin { display: inline-block; margin-top: 6px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
  .person-chip-linkedin:hover { color: var(--accent); }
  .badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; white-space: nowrap; display: inline-block; margin-top: 4px; }
  .badge-linkedin { background: rgba(74,158,255,0.1); color: var(--linkedin); border: 1px solid rgba(74,158,255,0.2); }
  .badge-email { background: rgba(255,140,74,0.1); color: var(--email); border: 1px solid rgba(255,140,74,0.2); }
  .badge-newsletter { background: rgba(176,106,245,0.1); color: var(--newsletter); border: 1px solid rgba(176,106,245,0.2); }
  .request-actions { display: flex; gap: 10px; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
  .done-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--accent); color: var(--accent); background: transparent; }
  .done-btn:hover { background: var(--accent); color: #0a0a0a; }
  .done-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .count-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-left: auto; }
  .empty { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 80px 0; letter-spacing: 0.08em; }
  #authGate { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 40px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }
  .auth-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .auth-desc { font-size: 13px; color: #888; }
  .auth-input { background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; width: 100%; }
  .auth-input:focus { border-color: var(--accent); }
  .auth-error { font-family: 'DM Mono', monospace; font-size: 10px; color: #ff6b6b; display: none; }
  .auth-btn { background: var(--accent); color: #0a0a0a; border: none; padding: 10px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  @media (max-width: 640px) { main { padding: 32px 20px; } .header-inner { padding: 20px; } .people-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">WARM<strong>BIT</strong></span>
    <span class="nav-label">INTRO REQUESTS</span>
  </div>
</header>

<div id="authGate">
  <div class="auth-box">
    <div class="auth-label">Access Required</div>
    <div class="auth-desc">Enter your password to view intro requests.</div>
    <input type="password" class="auth-input" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') checkPassword()" />
    <div class="auth-error" id="passwordError">Incorrect password.</div>
    <button class="auth-btn" onclick="checkPassword()">Enter →</button>
  </div>
</div>

<main id="mainContent" style="display:none;">
  <div class="page-label">Admin</div>
  <div class="page-title">Intro Requests</div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>
  <div id="requestsList"><div class="empty">Loading...</div></div>
</main>

<script>
const API = 'https://email-intelligence-production-3b44.up.railway.app';
const INTROS_PASSWORD = 'derrick';
let _allRequests = [];
let _currentFilter = 'all';

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if (input === INTROS_PASSWORD) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadRequests();
  } else {
    document.getElementById('passwordError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function setFilter(filter, btn) {
  _currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

function getBadgeClass(source) {
  const s = (source || '').toLowerCase();
  if (s.includes('linkedin')) return 'badge-linkedin';
  if (s.includes('newsletter')) return 'badge-newsletter';
  if (s.includes('note')) return 'badge-notes';
  return 'badge-email';
}

async function markDone(id, btn, blockId) {
  btn.textContent = 'Saving...';
  btn.disabled = true;
  try {
    await fetch(`${API}/intro_request/${id}/complete`, { method: 'POST' });
    const req = _allRequests.find(r => r.id === id);
    if (req) req.completed = true;
    renderRequests();
  } catch (e) {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

function renderRequests() {
  const list = document.getElementById('requestsList');
  let filtered = _allRequests;
  if (_currentFilter === 'pending') filtered = _allRequests.filter(r => !r.completed);
  if (_currentFilter === 'done') filtered = _allRequests.filter(r => r.completed);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">No ${_currentFilter === 'all' ? '' : _currentFilter + ' '}requests.</div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(req => {
    const date = new Date(req.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const people = req.requested_people || [];
    const block = document.createElement('div');
    block.className = `request-block${req.completed ? ' done' : ''}`;

    const peopleHtml = people.map(p => {
      const subtitle = [p.position, p.company].filter(Boolean).join(' · ');
      const badgeClass = getBadgeClass(p.source);
      return `<div class="person-chip">
        <div class="person-chip-name">${p.name || 'Unknown'}</div>
        ${subtitle ? `<div class="person-chip-title">${subtitle}</div>` : ''}
        <span class="badge ${badgeClass}">${(p.source || 'email').toLowerCase()}</span>
        ${p.linkedin_url ? `<a href="${p.linkedin_url}" target="_blank" class="person-chip-linkedin">LinkedIn →</a>` : ''}
      </div>`;
    }).join('');

    block.innerHTML = `
      <div class="request-meta">
        <span class="requester">✉ ${req.requester_email}</span>
        <span class="request-date">${date}</span>
      </div>
      ${req.query ? `<div class="request-query">"${req.query}"</div>` : ''}
      <div class="people-grid">${peopleHtml}</div>
      <div class="request-actions">
        ${req.completed
          ? `<span class="done-tag">✓ Intro sent</span>`
          : `<button class="done-btn" onclick="markDone('${req.id}', this)">Mark Intro Done</button>`
        }
        <span class="count-tag">${people.length} intro${people.length !== 1 ? 's' : ''} requested</span>
      </div>`;
    list.appendChild(block);
  });
}

async function loadRequests() {
  try {
    const res = await fetch(`${API}/intro_requests`);
    const data = await res.json();
    _allRequests = (data.requests || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    renderRequests();
  } catch (e) {
    document.getElementById('requestsList').innerHTML = '<div class="empty">Error loading requests.</div>';
  }
}
</script>
</body>
</html>
