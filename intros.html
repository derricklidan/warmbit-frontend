<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Requests · Rolodex</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --border-hover: #2a2a2a;
    --text: #e8e8e8; --muted: #555; --accent: #c8f25a; --accent-dim: rgba(200,242,90,0.08);
    --linkedin: #4a9eff; --email: #ff8c4a; --newsletter: #b06af5; --notes: #4aff9e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); }
  .header-inner { max-width: 960px; margin: 0 auto; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
  .logo strong { color: var(--accent); font-weight: 400; }
  .nav-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
  main { max-width: 960px; margin: 0 auto; padding: 48px 40px 80px; }
  .page-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .page-title { font-size: 24px; font-weight: 400; margin-bottom: 24px; }
  .filters { display: flex; gap: 8px; margin-bottom: 28px; }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .section-header { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .request-block { border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 12px; transition: border-color 0.2s; }
  .request-block.done { opacity: 0.45; }
  .request-block:hover { border-color: var(--border-hover); }
  .request-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; flex-wrap: wrap; }
  .requester { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.05em; }
  .request-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .request-query { font-size: 13px; color: #888; margin-bottom: 16px; font-style: italic; }
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .person-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .person-chip-name { font-size: 13px; font-weight: 400; }
  .person-chip-title { font-size: 11px; color: var(--muted); }
  .person-chip-email { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }
  .person-chip-links { display: flex; gap: 8px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .person-chip-linkedin { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; transition: all 0.15s; }
  .person-chip-linkedin:hover { color: var(--accent); border-color: var(--accent); }
  .badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; white-space: nowrap; }
  .badge-linkedin { background: rgba(74,158,255,0.1); color: var(--linkedin); border: 1px solid rgba(74,158,255,0.2); }
  .badge-email { background: rgba(255,140,74,0.1); color: var(--email); border: 1px solid rgba(255,140,74,0.2); }
  .badge-newsletter { background: rgba(176,106,245,0.1); color: var(--newsletter); border: 1px solid rgba(176,106,245,0.2); }
  .badge-notes { background: rgba(74,255,158,0.1); color: var(--notes); border: 1px solid rgba(74,255,158,0.2); }
  .request-actions { display: flex; gap: 8px; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .done-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--accent); color: var(--accent); background: transparent; }
  .done-btn:hover { background: var(--accent); color: #0a0a0a; }
  .draft-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); color: var(--muted); background: transparent; }
  .draft-btn:hover { border-color: var(--accent); color: var(--accent); }
  .done-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .disregard-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(255,80,80,0.3); color: rgba(255,80,80,0.6); background: transparent; }
  .disregard-btn:hover { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.8); color: #ff5050; }
  .disregard-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,80,80,0.5); letter-spacing: 0.08em; }
  .request-block.disregarded { opacity: 0.3; }
  .disregard-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all 0.15s; border: 1px solid rgba(255,80,80,0.3); color: rgba(255,80,80,0.6); background: transparent; }
  .disregard-btn:hover { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.7); color: rgba(255,80,80,1); }
  .disregard-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,80,80,0.5); letter-spacing: 0.08em; }
  .count-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-left: auto; }
  .email-draft-box { margin-top: 14px; background: #0d0d0d; border: 1px solid var(--border); border-radius: 3px; padding: 16px; display: none; }
  .email-draft-box.active { display: block; }
  .email-draft-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .email-draft-body { font-size: 13px; color: #aaa; line-height: 1.7; white-space: pre-wrap; min-height: 60px; }
  .email-draft-loading { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .loader-dots { display: flex; gap: 4px; }
  .loader-dots span { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  .copy-email-btn { margin-top: 10px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
  .copy-email-btn:hover { border-color: var(--accent); color: var(--accent); }
  .empty { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 60px 0; letter-spacing: 0.08em; }
  .custom-checkbox { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; position: relative; }
  .custom-checkbox:hover { border-color: var(--accent); }
  .custom-checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .custom-checkbox.checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: 2px solid #0a0a0a; border-top: none; border-left: none; transform: rotate(45deg); }
  .checkbox-selected { border-color: var(--accent) !important; background: var(--accent-dim) !important; }
  .export-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  #authGate { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 40px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; }
  .auth-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .auth-input { background: var(--bg); border: 1px solid var(--border); border-radius: 2px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; width: 100%; }
  .auth-input:focus { border-color: var(--accent); }
  .auth-error { font-family: 'DM Mono', monospace; font-size: 10px; color: #ff6b6b; display: none; }
  .auth-btn { background: var(--accent); color: #0a0a0a; border: none; padding: 10px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  @media (max-width: 640px) { main { padding: 32px 20px; } .header-inner { padding: 20px; } .people-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="https://warmbit.co" style="text-decoration:none"><span class="logo">ROLODEX</span></a>
    <span class="nav-label">INTRO REQUESTS</span>
  </div>
</header>

<div id="authGate">
  <div class="auth-box">
    <div class="auth-label">Access Required</div>
    <div style="font-size:13px;color:#888;">Enter your password to view intro requests.</div>
    <input type="password" class="auth-input" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') checkPassword()" />
    <div class="auth-error" id="passwordError">Incorrect password.</div>
    <button class="auth-btn" onclick="checkPassword()">Enter →</button>
  </div>
</div>

<main id="mainContent" style="display:none;">
  <div class="page-label">Admin</div>
  <div class="page-title">Intro Requests</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
    <div class="filters" style="margin-bottom:0;">
      <button class="filter-btn active" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
      <button class="filter-btn" onclick="setFilter('disregarded', this)">Disregarded</button>
      <button class="filter-btn" onclick="setFilter('all', this)">All</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="export-btn" onclick="toggleSelectAll(this)">Select All</button>
      <button class="export-btn" onclick="exportCSV()">Export CSV →</button>
    </div>
  </div>
  <div id="requestsList"><div class="empty">Loading...</div></div>
</main>

<script>
const API = 'https://email-intelligence-production-3b44.up.railway.app';
const INTROS_PASSWORD = 'derrick';
let _allRequests = [];
let _currentFilter = 'pending';

function setFilter(filter, btn) {
  _currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if (input === INTROS_PASSWORD) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadRequests();
  } else {
    document.getElementById('passwordError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function getBadgeClass(source) {
  const s = (source || '').toLowerCase();
  if (s.includes('linkedin')) return 'badge-linkedin';
  if (s.includes('newsletter')) return 'badge-newsletter';
  if (s.includes('note')) return 'badge-notes';
  return 'badge-email';
}

async function markDone(id, btn, blockId) {
  btn.textContent = 'Saving...';
  btn.disabled = true;
  try {
    await fetch(`${API}/intro_request/${id}/complete`, { method: 'POST' });
    const req = _allRequests.find(r => r.id === id);
    if (req) req.completed = true;
    const block = document.getElementById(blockId);
    if (block) {
      block.classList.add('done');
      const actions = block.querySelector('.request-actions');
      // Remove both action buttons and replace with done tag
      actions.querySelectorAll('.done-btn, .disregard-btn').forEach(b => b.remove());
      const tag = document.createElement('span');
      tag.className = 'done-tag';
      tag.textContent = '✓ Intro sent';
      actions.prepend(tag);
    }
  } catch (e) {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

async function markDisregarded(id, btn, blockId) {
  btn.textContent = 'Saving...';
  btn.disabled = true;
  try {
    await fetch(`${API}/intro_request/${id}/disregard`, { method: 'POST' });
    const req = _allRequests.find(r => r.id === id);
    if (req) req.disregarded = true;
    const block = document.getElementById(blockId);
    if (block) {
      block.classList.add('done');
      const actions = block.querySelector('.request-actions');
      actions.querySelectorAll('.done-btn, .disregard-btn').forEach(b => b.remove());
      const tag = document.createElement('span');
      tag.className = 'disregard-tag';
      tag.textContent = '✕ Disregarded';
      actions.prepend(tag);
    }
  } catch (e) {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

async function toggleDraft(reqId, people, query, requesterEmail, btn) {
  const box = document.getElementById(`draft-${reqId}`);
  if (box.classList.contains('active')) {
    box.classList.remove('active');
    btn.textContent = 'Draft Email';
    return;
  }
  box.classList.add('active');
  btn.textContent = 'Hide Draft';

  if (box.dataset.loaded) return;
  box.dataset.loaded = '1';

  const person = people[0];
  const firstName = (person.name || '').split(' ')[0];
  const personContext = [person.position, person.company].filter(Boolean).join(' at ');
  const prompt = `Draft a short, warm email from me (Derrick, a VC) to ${firstName} (${personContext}).

The person who asked for this intro is ${requesterEmail}. The search context was: "${query}".

The email should:
- Be addressed to ${firstName}
- Briefly explain that I work with a portfolio company that I think is relevant to them
- Reference why they specifically would care based on their role/company and the search context
- Ask if I can make the intro
- Be 3-4 sentences max, casual and warm, no fluff
- End with asking if ok to connect them

Only output the email body, ready to send. No subject line.`;

  try {
    const res = await fetch(`${API}/draft_email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: prompt })
    });
    const data = await res.json();
    box.querySelector('.email-draft-loading').style.display = 'none';
    box.querySelector('.email-draft-body').textContent = data.email || 'Could not generate email.';
    box.querySelector('.copy-email-btn').style.display = 'inline-block';
  } catch {
    box.querySelector('.email-draft-loading').style.display = 'none';
    box.querySelector('.email-draft-body').textContent = 'Error generating email.';
  }
}

function copyDraft(btn, reqId) {
  const text = document.querySelector(`#draft-${reqId} .email-draft-body`).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function buildPersonBlock(req, person, idx) {
  const date = new Date(req.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  const subtitle = [person.position, person.company].filter(Boolean).join(' · ');
  const badgeClass = getBadgeClass(person.source);
  const blockId = `${req.id}-${idx}`;
  const doneKey = `${req.id}-${idx}`;
  const personJson = JSON.stringify([person]).replace(/"/g, '&quot;');
  const queryEsc = (req.query || '').replace(/"/g, '&quot;');
  const emailEsc = (req.requester_email || '').replace(/"/g, '&quot;');

  const block = document.createElement('div');
  block.className = `request-block${req.disregarded ? ' disregarded' : req.completed ? ' done' : ''}`;
  block.id = `block-${blockId}`;

  block.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <div class="request-meta" style="margin-bottom:0;flex:1;">
        <span class="requester">✉ ${req.requester_email}</span>
        <span class="request-date">${date}</span>
      </div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;margin-left:12px;">
        <div class="custom-checkbox" id="chk-${blockId}" data-block="${blockId}" onclick="this.classList.toggle('checked');this.closest('.request-block').classList.toggle('checkbox-selected',this.classList.contains('checked'))"></div>
      </label>
    </div>
    ${req.query ? `<div class="request-query">"${req.query}"</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:400;">${person.name || 'Unknown'}</div>
      ${subtitle ? `<div style="font-size:12px;color:var(--muted);">${subtitle}</div>` : ''}
      ${person.email ? `<div class="person-chip-email">✉ ${person.email}</div>` : ''}
      <div class="person-chip-links">
        ${person.linkedin_url ? `<a href="${person.linkedin_url}" target="_blank" class="person-chip-linkedin">LinkedIn →</a>` : ''}
      </div>
    </div>
    <div class="request-actions">
      ${req.completed
        ? `<span class="done-tag">✓ Intro sent</span>`
        : req.disregarded
        ? `<span class="disregard-tag">✕ Disregarded</span>`
        : `<button class="done-btn" onclick="markDone('${req.id}', this, 'block-${blockId}')">Mark Intro Done</button>
           <button class="disregard-btn" onclick="markDisregarded('${req.id}', this, 'block-${blockId}')">Disregard</button>`
      }
      <button class="draft-btn" onclick="toggleDraft('${blockId}', JSON.parse(this.dataset.people), this.dataset.query, this.dataset.email, this)" data-people="${personJson}" data-query="${queryEsc}" data-email="${emailEsc}">Draft Email</button>
    </div>
    <div class="email-draft-box" id="draft-${blockId}">
      <div class="email-draft-label">Draft Intro Email</div>
      <div class="email-draft-loading"><div class="loader-dots"><span></span><span></span><span></span></div><span>Drafting...</span></div>
      <div class="email-draft-body"></div>
      <button class="copy-email-btn" style="display:none" onclick="copyDraft(this, '${blockId}')">Copy</button>
    </div>`;

  block.dataset.person = JSON.stringify(person);
  block.dataset.requester = req.requester_email;
  block.dataset.query = req.query || '';
  block.dataset.date = req.created_at;
  block.dataset.status = req.completed ? 'Done' : 'Pending';
  return block;
}

function buildRequestBlock(req) {
  const people = req.requested_people || [];
  const frag = document.createDocumentFragment();
  people.forEach((p, i) => frag.appendChild(buildPersonBlock(req, p, i)));
  return frag;
}

function renderRequests() {
  const list = document.getElementById('requestsList');
  list.innerHTML = '';

  const pending = _allRequests.filter(r => !r.completed && !r.disregarded);
  const done = _allRequests.filter(r => r.completed && !r.disregarded);
  const disregarded = _allRequests.filter(r => r.disregarded);

  if (_allRequests.length === 0) {
    list.innerHTML = '<div class="empty">No intro requests yet.</div>';
    return;
  }

  if (_currentFilter === 'pending') {
    if (pending.length === 0) { list.innerHTML = '<div class="empty">No pending requests.</div>'; return; }
    pending.forEach(r => list.appendChild(buildRequestBlock(r)));
  } else if (_currentFilter === 'done') {
    if (done.length === 0) { list.innerHTML = '<div class="empty">No completed intros yet.</div>'; return; }
    done.forEach(r => list.appendChild(buildRequestBlock(r)));
  } else if (_currentFilter === 'disregarded') {
    if (disregarded.length === 0) { list.innerHTML = '<div class="empty">No disregarded requests.</div>'; return; }
    disregarded.forEach(r => list.appendChild(buildRequestBlock(r)));
  } else {
    const sections = [['Pending', pending], ['Done', done], ['Disregarded', disregarded]];
    sections.forEach(([label, items]) => {
      if (items.length === 0) return;
      const h = document.createElement('div');
      h.className = 'section-header';
      h.textContent = `${label} · ${items.length}`;
      list.appendChild(h);
      items.forEach(r => list.appendChild(buildRequestBlock(r)));
    });
  }
}

function toggleSelectAll(btn) {
  const checkboxes = document.querySelectorAll('.custom-checkbox');
  const allChecked = Array.from(checkboxes).every(c => c.classList.contains('checked'));
  checkboxes.forEach(c => {
    if (allChecked) {
      c.classList.remove('checked');
      c.closest('.request-block').classList.remove('checkbox-selected');
    } else {
      c.classList.add('checked');
      c.closest('.request-block').classList.add('checkbox-selected');
    }
  });
  btn.textContent = allChecked ? 'Select All' : 'Deselect All';
}

function exportCSV() {
  const checked = document.querySelectorAll('.custom-checkbox.checked');
  const rows = [['Name', 'Email', 'Company', 'Position', 'LinkedIn', 'Requested By', 'Query', 'Date', 'Status']];

  if (checked.length === 0) {
    alert('Please check at least one person to export.');
    return;
  }

  checked.forEach(chk => {
    const block = chk.closest('.request-block');
    if (!block || !block.dataset.person) return;
    const p = JSON.parse(block.dataset.person);
    const date = new Date(block.dataset.date).toLocaleDateString();
    rows.push([
      p.name || '',
      p.email || '',
      p.company || '',
      p.position || '',
      p.linkedin_url || '',
      block.dataset.requester || '',
      block.dataset.query || '',
      date,
      block.dataset.status || ''
    ]);
  });

  const csv = rows.map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `intro-requests-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function loadRequests() {
  try {
    const res = await fetch(`${API}/intro_requests`);
    const data = await res.json();
    _allRequests = (data.requests || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    renderRequests();
  } catch (e) {
    document.getElementById('requestsList').innerHTML = '<div class="empty">Error loading requests.</div>';
  }
}
</script>
</body>
</html>
