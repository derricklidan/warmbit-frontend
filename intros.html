<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requested Intros · Warmbit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e; --border-hover: #2a2a2a;
    --text: #e8e8e8; --muted: #555; --accent: #c8f25a; --accent-dim: rgba(200,242,90,0.08);
    --linkedin: #4a9eff; --email: #ff8c4a; --newsletter: #b06af5; --notes: #4aff9e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); }
  .header-inner { max-width: 900px; margin: 0 auto; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
  .logo strong { color: var(--accent); font-weight: 400; }
  .back-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 6px 14px; border-radius: 2px; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  main { max-width: 900px; margin: 0 auto; padding: 48px 40px 80px; }
  .page-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .page-title { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .page-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 40px; }
  .divider { height: 1px; background: var(--border); margin: 32px 0; }
  .person-block { margin-bottom: 40px; }
  .person-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
  .person-info { flex: 1; }
  .person-name { font-size: 18px; font-weight: 400; }
  .person-title { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .badge { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 8px; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
  .badge-linkedin { background: rgba(74,158,255,0.1); color: var(--linkedin); border: 1px solid rgba(74,158,255,0.2); }
  .badge-email { background: rgba(255,140,74,0.1); color: var(--email); border: 1px solid rgba(255,140,74,0.2); }
  .badge-newsletter { background: rgba(176,106,245,0.1); color: var(--newsletter); border: 1px solid rgba(176,106,245,0.2); }
  .badge-notes { background: rgba(74,255,158,0.1); color: var(--notes); border: 1px solid rgba(74,255,158,0.2); }
  .person-reason { font-size: 13px; color: #888; line-height: 1.65; margin-bottom: 16px; }
  .email-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
  .email-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .email-body { font-size: 13px; line-height: 1.7; color: #aaa; white-space: pre-wrap; min-height: 80px; }
  .email-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }
  .loader-dots { display: flex; gap: 4px; }
  .loader-dots span { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  .copy-btn { margin-top: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .person-email { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  @media (max-width: 640px) { main { padding: 32px 20px; } .header-inner { padding: 20px; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">WARM<strong>BIT</strong></span>
    <a href="/" class="back-btn">← Back to Search</a>
  </div>
</header>

<main>
  <div class="page-label">Requested Intros</div>
  <div class="page-title" id="pageTitle">Loading...</div>
  <div class="page-meta" id="pageMeta"></div>
  <div id="peopleList"></div>
</main>

<script>
const API = 'https://email-intelligence-production-3b44.up.railway.app';

function getBadgeClass(source) {
  const s = (source || '').toLowerCase();
  if (s.includes('linkedin')) return 'badge-linkedin';
  if (s.includes('newsletter')) return 'badge-newsletter';
  if (s.includes('note')) return 'badge-notes';
  return 'badge-email';
}

async function draftIntroEmail(person, query, container) {
  const loadingEl = container.querySelector('.email-loading');
  const bodyEl = container.querySelector('.email-body');
  const copyBtn = container.querySelector('.copy-btn');

  try {
    const res = await fetch(`${API}/draft_email`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: `Draft a warm intro request email to ${person.name}, ${person.position} at ${person.company}. Context about why they're relevant: ${person.reason}. The search query was: "${query}".`
      })
    });
    const data = await res.json();
    loadingEl.style.display = 'none';
    bodyEl.textContent = data.email || 'Could not generate email.';
    copyBtn.style.display = 'inline-block';
  } catch {
    loadingEl.style.display = 'none';
    bodyEl.textContent = 'Error generating email.';
  }
}

function copyEmail(btn, bodyEl) {
  navigator.clipboard.writeText(bodyEl.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy email', 2000);
  });
}

function render(query, people) {
  document.getElementById('pageTitle').textContent = `${people.length} Introduction${people.length !== 1 ? 's' : ''} Requested`;
  document.getElementById('pageMeta').textContent = `For: "${query}"`;

  const list = document.getElementById('peopleList');
  list.innerHTML = '';

  people.forEach((p, i) => {
    const source = (p.source || 'email').toLowerCase();
    const badgeClass = getBadgeClass(source);
    const subtitle = [p.position, p.company].filter(Boolean).join(' · ');

    const block = document.createElement('div');
    block.className = 'person-block';
    block.innerHTML = `
      ${i > 0 ? '<div class="divider"></div>' : ''}
      <div class="person-header">
        <div class="person-info">
          <div class="person-name">${p.name || 'Unknown'}</div>
          ${subtitle ? `<div class="person-title">${subtitle}</div>` : ''}
          ${p.email ? `<div class="person-email">✉ ${p.email}</div>` : ''}
        </div>
        <span class="badge ${badgeClass}">${source}</span>
      </div>
      <div class="person-reason">${p.reason || ''}</div>
      <div class="email-box">
        <div class="email-label">Draft Intro Email</div>
        <div class="email-loading">
          <div class="loader-dots"><span></span><span></span><span></span></div>
          <span>Drafting email...</span>
        </div>
        <div class="email-body" style="display:none"></div>
        <button class="copy-btn" style="display:none" onclick="copyEmail(this, this.previousElementSibling)">Copy email</button>
      </div>
    `;

    list.appendChild(block);

    // Draft email for this person
    const emailBox = block.querySelector('.email-box');
    const bodyEl = block.querySelector('.email-body');
    
    draftIntroEmail(p, query, emailBox).then(() => {
      bodyEl.style.display = 'block';
    });
  });
}

// Parse data from URL
try {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('data');
  if (raw) {
    const parsed = JSON.parse(decodeURIComponent(raw));
    render(parsed.query, parsed.people);
  } else {
    document.getElementById('pageTitle').textContent = 'No intros selected.';
  }
} catch (e) {
  document.getElementById('pageTitle').textContent = 'Error loading intros.';
}
</script>
</body>
</html>
